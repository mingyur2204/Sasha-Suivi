<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi quotidien — Sacha</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f4f6f8;color:#1a1a2e;min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
header{margin-bottom:1.5rem}
h1{font-size:20px;font-weight:600;color:#1a1a2e}
.sub{font-size:13px;color:#6b7280;margin-top:3px}
.top-bar{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px}
.date-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.date-row label{font-size:13px;color:#6b7280}
.date-row input[type=date]{font-size:13px;padding:7px 12px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#1a1a2e;outline:none}
.date-row input[type=date]:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.tabs{display:flex;gap:2px;margin-bottom:1.5rem;background:#e5e7eb;border-radius:10px;padding:4px;width:fit-content}
.tab{font-size:13px;padding:7px 18px;cursor:pointer;color:#6b7280;border-radius:8px;border:none;background:transparent;font-weight:500;transition:all .15s}
.tab.active{background:#fff;color:#1a1a2e;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.tab:hover:not(.active){color:#1a1a2e}
.panel{display:none}.panel.active{display:block}
.card{background:#fff;border-radius:12px;border:1px solid #e5e7eb;padding:1.25rem;margin-bottom:1rem}
.section-header{font-size:11px;font-weight:600;letter-spacing:.07em;color:#6b7280;text-transform:uppercase;padding:4px 0;margin:1.25rem 0 8px;border-bottom:1px solid #e5e7eb}
.kpi-row{display:grid;grid-template-columns:1fr 130px;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid #f3f4f6}
.kpi-row:last-child{border-bottom:none}
.kpi-label{font-size:14px;color:#1a1a2e;line-height:1.4}
.kpi-hint{font-size:11px;color:#9ca3af;margin-top:2px}
.btn-group{display:flex;gap:4px;justify-content:flex-end}
.btn-onz{padding:6px 11px;font-size:12px;font-weight:600;border-radius:7px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#6b7280;transition:all .12s}
.btn-onz:hover{border-color:#9ca3af;color:#1a1a2e}
.btn-onz.sel-O{background:#d1fae5;color:#065f46;border-color:#6ee7b7}
.btn-onz.sel-N{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5}
.btn-onz.sel-Q{background:#fef3c7;color:#78350f;border-color:#fcd34d}
.action-bar{display:flex;gap:10px;justify-content:flex-end;margin-top:1.5rem}
.btn-save{padding:10px 24px;font-size:14px;font-weight:600;border-radius:8px;border:none;cursor:pointer;background:#4f46e5;color:#fff;transition:all .15s}
.btn-save:hover{background:#4338ca}
.btn-reset{padding:10px 18px;font-size:14px;font-weight:500;border-radius:8px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#6b7280;transition:all .15s}
.btn-reset:hover{background:#f9fafb}
.journal-wrap{overflow-x:auto}
.journal-table{width:100%;border-collapse:collapse;font-size:12px}
.journal-table th{padding:8px 5px;text-align:center;font-weight:600;font-size:10px;color:#6b7280;border-bottom:2px solid #e5e7eb;background:#f9fafb;white-space:nowrap}
.journal-table td{padding:7px 4px;text-align:center;border-bottom:1px solid #f3f4f6;color:#1a1a2e}
.journal-table tr:hover td{background:#f9fafb}
.cell-O{color:#065f46;font-weight:700}.cell-N{color:#7f1d1d;font-weight:700}.cell-Q{color:#78350f;font-weight:700}
.empty-state{text-align:center;padding:3rem 1rem;color:#9ca3af;font-size:14px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px 16px}
.stat-label{font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
.stat-val{font-size:26px;font-weight:700;color:#1a1a2e}
.stat-sub{font-size:11px;color:#9ca3af;margin-top:3px}
.corr-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f3f4f6;font-size:13px;gap:12px}
.corr-label{color:#374151;flex:1}
.corr-pct{font-weight:700;font-size:14px;white-space:nowrap}
.pct-high{color:#dc2626}.pct-mid{color:#d97706}.pct-low{color:#059669}
.badge-na{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:500;background:#e0e7ff;color:#3730a3}
.bar-row{display:grid;grid-template-columns:42px 1fr 80px 44px;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:13px}
.bar-track{background:#e5e7eb;border-radius:999px;height:7px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px}
.export-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:1rem}
.btn-export{padding:8px 16px;font-size:13px;font-weight:500;border-radius:8px;border:1px solid #d1d5db;cursor:pointer;background:#fff;color:#374151;transition:all .15s}
.btn-export:hover{background:#f3f4f6}
.del-btn{font-size:10px;padding:3px 7px;border-radius:6px;border:1px solid #e5e7eb;cursor:pointer;background:#fff;color:#9ca3af}
.del-btn:hover{border-color:#fca5a5;color:#ef4444}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.progress-bar{height:4px;background:#e5e7eb;border-radius:999px;margin-bottom:1.5rem;overflow:hidden}
.progress-fill{height:100%;background:#4f46e5;border-radius:999px;transition:width .3s}
.progress-label{font-size:12px;color:#6b7280;text-align:right;margin-top:4px}
</style>
</head>
<body>
<div class="app">

<header>
  <div class="top-bar">
    <div>
      <h1>Suivi quotidien — Sacha</h1>
      <div class="sub">Saisie du matin · bilan de la nuit et de la veille</div>
    </div>
    <div class="date-row">
      <label>Date du bilan</label>
      <input type="date" id="dateInput">
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="switchTab('saisie',this)">Saisie du jour</button>
  <button class="tab" onclick="switchTab('journal',this)">Journal</button>
  <button class="tab" onclick="switchTab('stats',this)">Statistiques</button>
</div>

<div id="panel-saisie" class="panel active">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-label" id="progressLabel">0 / 23 indicateurs remplis</div>

  <div class="section-header">🌙 Nuit &amp; Sommeil</div>
  <div class="card" id="kpi-sommeil"></div>

  <div class="section-header">😶 Humeur &amp; État observé</div>
  <div class="card" id="kpi-humeur"></div>

  <div class="section-header">🚨 Consommation (perception)</div>
  <div class="card" id="kpi-conso"></div>

  <div class="section-header">🏥 Rendez-vous &amp; Soins</div>
  <div class="card" id="kpi-soins"></div>

  <div class="section-header">🚆 Activités &amp; Déplacements</div>
  <div class="card" id="kpi-activites"></div>

  <div class="section-header">🍽️ Alimentation</div>
  <div class="card" id="kpi-alim"></div>

  <div class="action-bar">
    <button class="btn-reset" onclick="resetForm()">Réinitialiser</button>
    <button class="btn-save" onclick="saveDay()">Enregistrer cette journée</button>
  </div>
</div>

<div id="panel-journal" class="panel">
  <div class="export-bar">
    <button class="btn-export" onclick="exportCSV()">⬇ Exporter CSV</button>
    <button class="btn-export" onclick="exportExcel()">⬇ Exporter Excel</button>
  </div>
  <div class="card" id="journal-content"></div>
</div>

<div id="panel-stats" class="panel">
  <div id="stats-content"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const KPIs = [
  {id:'S1',cat:'sommeil',label:'Couché avant 22h (hors week-end)',hint:'Règle convenue : 22h00'},
  {id:'S2',cat:'sommeil',label:'Ordi et téléphone sortis de la chambre',hint:'Règle maison'},
  {id:'S3',cat:'sommeil',label:'Levé avant 9h',hint:'Règle convenue : 9h00'},
  {id:'S4',cat:'sommeil',label:'Douche + prêt avant 10h30',hint:'Routine matinale'},
  {id:'S5',cat:'sommeil',label:'Nuit calme (pas de ronflement inquiétant)',hint:'Ronflement fort = apnée possible'},
  {id:'S6',cat:'sommeil',label:'Levé manger pendant la nuit',hint:'O = oui, il s\'est levé'},
  {id:'H1',cat:'humeur',label:'Semble de bonne humeur / participatif',hint:'Impression générale'},
  {id:'H2',cat:'humeur',label:'Visage normal (pas bouffi / gonflé)',hint:'Signe possible de consommation'},
  {id:'H3',cat:'humeur',label:'Bonne mémoire / pas de blancs apparents',hint:'Trous de mémoire = signal'},
  {id:'H4',cat:'humeur',label:'Communication ouverte avec moi',hint:'A parlé, échangé spontanément'},
  {id:'C1',cat:'conso',label:'Je pense qu\'il n\'a PAS consommé',hint:'O = pas de conso perçue'},
  {id:'C2',cat:'conso',label:'Je SAIS qu\'il n\'a pas consommé (certitude)',hint:'O = certitude · ? = doute'},
  {id:'C3',cat:'conso',label:'A respecté la règle maison (pas de drogue)',hint:'Cannabis occasionnel le soir = toléré'},
  {id:'M1',cat:'soins',label:'Rendez-vous médical prévu aujourd\'hui',hint:'O = oui prévu'},
  {id:'M2',cat:'soins',label:'Rendez-vous honoré (si prévu)',hint:'Mettre ? si aucun RDV aujourd\'hui'},
  {id:'M3',cat:'soins',label:'A pris ses médicaments',hint:'Selon traitement en cours'},
  {id:'A1',cat:'activites',label:'Déplacement à Lausanne aujourd\'hui',hint:'Toute sortie vers Lausanne'},
  {id:'A2',cat:'activites',label:'Visite chez sa maman',hint:'Contexte émotionnel sensible'},
  {id:'A3',cat:'activites',label:'Sorti de la maison (autre)',hint:'Amis, courses, promenade…'},
  {id:'A4',cat:'activites',label:'A préparé un repas cette semaine',hint:'Cocher O le jour où c\'est fait'},
  {id:'A5',cat:'activites',label:'A passé l\'aspirateur cette semaine',hint:'Cocher O le jour où c\'est fait'},
  {id:'A6',cat:'activites',label:'A passé la nuit à l\'extérieur (chez maman ou autre)',hint:'O = absent cette nuit · préciser en notes si utile'},
  {id:'AL1',cat:'alim',label:'A mangé dans les espaces communs',hint:'Pas de nourriture en chambre'},
  {id:'AL2',cat:'alim',label:'Appétit correct (ni excès ni refus)',hint:'Extrêmes = signal'},
];

const catMap = {sommeil:'kpi-sommeil',humeur:'kpi-humeur',conso:'kpi-conso',soins:'kpi-soins',activites:'kpi-activites',alim:'kpi-alim'};
let formState = {};

function initDate(){
  const d = new Date();
  document.getElementById('dateInput').value = d.toISOString().split('T')[0];
}

function renderForm(){
  KPIs.forEach(k=>{ if(!(k.id in formState)) formState[k.id]=null; });
  const filled = KPIs.filter(k=>formState[k.id]!==null).length;
  const pct = Math.round(filled/KPIs.length*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = filled+' / '+KPIs.length+' indicateurs remplis';

  Object.keys(catMap).forEach(cat=>{
    const el = document.getElementById(catMap[cat]);
    el.innerHTML = '';
    KPIs.filter(k=>k.cat===cat).forEach(k=>{
      const row = document.createElement('div');
      row.className = 'kpi-row';
      row.innerHTML = `<div>
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-hint">${k.hint}</div>
      </div>
      <div class="btn-group">
        <button class="btn-onz ${formState[k.id]==='O'?'sel-O':''}" onclick="setVal('${k.id}','O')">O</button>
        <button class="btn-onz ${formState[k.id]==='N'?'sel-N':''}" onclick="setVal('${k.id}','N')">N</button>
        <button class="btn-onz ${formState[k.id]==='?'?'sel-Q':''}" onclick="setVal('${k.id}','?')">?</button>
      </div>`;
      el.appendChild(row);
    });
  });
}

function setVal(id, val){
  formState[id] = formState[id]===val ? null : val;
  renderForm();
}

function resetForm(){
  KPIs.forEach(k=>{ formState[k.id]=null; });
  renderForm();
}

function getEntries(){
  try{ return JSON.parse(localStorage.getItem('sacha_entries')||'[]'); }
  catch(e){ return []; }
}
function saveEntries(arr){ localStorage.setItem('sacha_entries', JSON.stringify(arr)); }

function saveDay(){
  const date = document.getElementById('dateInput').value;
  if(!date){ showToast('Sélectionnez une date'); return; }
  const filled = KPIs.filter(k=>formState[k.id]!==null).length;
  if(filled===0){ showToast('Remplissez au moins un indicateur'); return; }
  const entries = getEntries();
  const idx = entries.findIndex(e=>e.date===date);
  const entry = {date, ...Object.fromEntries(KPIs.map(k=>[k.id, formState[k.id]||'']))};
  if(idx>=0) entries[idx]=entry; else entries.push(entry);
  entries.sort((a,b)=>b.date.localeCompare(a.date));
  saveEntries(entries);
  showToast('Journée enregistrée ✓');
  resetForm();
  const d = new Date(date+'T12:00:00');
  d.setDate(d.getDate()+1);
  document.getElementById('dateInput').value = d.toISOString().split('T')[0];
}

function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='journal') renderJournal();
  if(name==='stats') renderStats();
}

function renderJournal(){
  const entries = getEntries();
  const el = document.getElementById('journal-content');
  if(!entries.length){ el.innerHTML='<div class="empty-state">Aucune journée enregistrée pour l\'instant.</div>'; return; }
  const cols = KPIs.map(k=>k.id);
  let html = `<div class="journal-wrap"><table class="journal-table">
  <thead><tr><th>Date</th>${cols.map(c=>`<th>${c}</th>`).join('')}<th></th></tr></thead><tbody>`;
  entries.forEach((e,i)=>{
    const d = new Date(e.date+'T12:00:00');
    const label = d.toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'2-digit'});
    html += `<tr><td style="font-size:12px;white-space:nowrap;color:#374151">${label}</td>`;
    cols.forEach(c=>{
      const v = e[c]||'';
      const cls = v==='?'?'cell-Q':(v?'cell-'+v:'');
      html += `<td class="${cls}">${v||'—'}</td>`;
    });
    html += `<td><button class="del-btn" onclick="deleteEntry(${i})">✕</button></td></tr>`;
  });
  html += '</tbody></table></div>';
  el.innerHTML = html;
}

function deleteEntry(i){
  if(!confirm('Supprimer cette entrée ?')) return;
  const entries = getEntries();
  entries.splice(i,1);
  saveEntries(entries);
  renderJournal();
  showToast('Entrée supprimée');
}

function renderStats(){
  const entries = getEntries();
  const el = document.getElementById('stats-content');
  if(entries.length<3){ el.innerHTML='<div class="card"><div class="empty-state">Enregistrez au moins 3 journées pour voir les statistiques.</div></div>'; return; }

  const n = entries.length;
  const pct = id => Math.round(entries.filter(e=>e[id]==='O').length/n*100);
  const sommeilScore = Math.round(['S1','S2','S3','S4','S5'].reduce((a,k)=>a+pct(k),0)/5);
  const humeurScore = Math.round(['H1','H2','H3','H4'].reduce((a,k)=>a+pct(k),0)/4);
  const consoScore = pct('C1');
  const soinsScore = pct('M3');

  let html = `<div class="stats-grid">
    <div class="stat-card"><div class="stat-label">Journées enregistrées</div><div class="stat-val">${n}</div></div>
    <div class="stat-card"><div class="stat-label">Score sommeil</div><div class="stat-val">${sommeilScore}%</div><div class="stat-sub">% de bonnes nuits</div></div>
    <div class="stat-card"><div class="stat-label">Score humeur</div><div class="stat-val">${humeurScore}%</div><div class="stat-sub">% jours positifs</div></div>
    <div class="stat-card"><div class="stat-label">Conso non perçue</div><div class="stat-val">${consoScore}%</div><div class="stat-sub">% jours sans signal</div></div>
  </div>`;

  const corrGroups = [
    {
      title:'Signaux de consommation (addictologie)',
      color:'#7f1d1d',
      bg:'#fef2f2',
      items:[
        {label:'Visite maman → conso perçue le lendemain', trigger:'A2', effect:'C1', invert:true},
        {label:'Nuit à l\'extérieur → conso perçue le lendemain', trigger:'A6', effect:'C1', invert:true},
        {label:'Visage bouffi → trous de mémoire (combo conso)', trigger:'H2', effect:'H3', invert:true},
        {label:'Levé la nuit → appétit excessif le lendemain', trigger:'S6', effect:'AL2', invert:true},
        {label:'Ronflement inquiétant → visage bouffi le matin', trigger:'S5', effect:'H2', invert:true},
      ]
    },
    {
      title:'Cycles dépressifs (psychiatrie)',
      color:'#1e3a5f',
      bg:'#eff6ff',
      items:[
        {label:'Communication fermée → mauvaise nuit le lendemain', trigger:'H4', effect:'S5', invert:true},
        {label:'Pas de sortie → humeur négative le lendemain', trigger:'A3', effect:'H1', invert:true},
        {label:'Médicaments non pris → humeur négative 48h après', trigger:'M3', effect:'H1', invert:true},
        {label:'Déplacement Lausanne → mauvaise nuit le lendemain', trigger:'A1', effect:'S5', invert:true},
      ]
    },
    {
      title:'Déclencheurs relationnels',
      color:'#4c1d95',
      bg:'#f5f3ff',
      items:[
        {label:'Visite maman → communication fermée le lendemain', trigger:'A2', effect:'H4', invert:true},
        {label:'Visite maman → mauvaise nuit le lendemain', trigger:'A2', effect:'S5', invert:true},
        {label:'RDV médical honoré → stabilité humeur le lendemain', trigger:'M2', effect:'H1', invert:false},
      ]
    },
    {
      title:'Facteurs de protection (ce qui fonctionne)',
      color:'#064e3b',
      bg:'#f0fdf4',
      items:[
        {label:'Repas préparé → humeur positive ce jour', trigger:'A4', effect:'H1', invert:false},
        {label:'Sortie extérieure → meilleure nuit suivante', trigger:'A3', effect:'S5', invert:false},
        {label:'Nuit calme → humeur positive le lendemain', trigger:'S5', effect:'H1', invert:false},
        {label:'Couché avant 22h → levé avant 9h', trigger:'S1', effect:'S3', invert:false},
      ]
    },
  ];

  corrGroups.forEach(grp=>{
    html += `<div class="card" style="margin-bottom:1rem">
    <div style="font-size:12px;font-weight:700;color:${grp.color};background:${grp.bg};padding:6px 10px;border-radius:8px;margin-bottom:10px;letter-spacing:.03em">${grp.title}</div>`;
    grp.items.forEach(cor=>{
      const triggered = entries.filter((e,i)=>e[cor.trigger]==='O' && i+1<entries.length);
      if(triggered.length<2){
        html+=`<div class="corr-row"><span class="corr-label">${cor.label}</span><span class="badge-na">données insuf.</span></div>`;
        return;
      }
      const avec = triggered.filter(e=>{
        const idx = entries.indexOf(e);
        const next = entries[idx+1];
        if(!next) return false;
        return cor.invert ? next[cor.effect]==='N' : next[cor.effect]==='O';
      }).length;
      const p = Math.round(avec/triggered.length*100);
      const isProtect = grp.title.includes('protection');
      const cls = isProtect ? (p>=60?'pct-low':p>=30?'pct-mid':'pct-high') : (p>=50?'pct-high':p>=30?'pct-mid':'pct-low');
      html+=`<div class="corr-row"><span class="corr-label">${cor.label}</span><span class="corr-pct ${cls}">${p}% <span style="font-weight:400;font-size:11px;color:#9ca3af">(${triggered.length} cas)</span></span></div>`;
    });
    html += '</div>';
  });

  html += `<div class="card" style="margin-top:1rem">
  <div style="font-size:13px;font-weight:600;color:#374151;margin-bottom:12px">Détail par indicateur (% O sur ${n} jours)</div>`;
  KPIs.forEach(k=>{
    const p = pct(k.id);
    const color = p>=60?'#059669':p>=40?'#d97706':'#dc2626';
    html+=`<div class="bar-row">
      <span style="color:#6b7280;font-weight:600;font-size:12px">${k.id}</span>
      <span style="color:#374151">${k.label}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${color}"></div></div>
      <span style="text-align:right;font-weight:700;font-size:13px;color:${color}">${p}%</span>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function exportCSV(){
  const entries = getEntries();
  if(!entries.length){ showToast('Aucune donnée à exporter'); return; }
  const cols = KPIs.map(k=>k.id);
  const labels = KPIs.map(k=>k.label);
  const header = ['Date',...cols].join(';');
  const desc   = ['Indicateur',...labels].join(';');
  const rows   = entries.map(e=>[e.date,...cols.map(c=>e[c]||'')].join(';'));
  const csv    = [header,desc,...rows].join('\n');
  dl('\uFEFF'+csv, 'Suivi_Sacha_'+today()+'.csv', 'text/csv;charset=utf-8');
  showToast('CSV exporté ✓');
}

function exportExcel(){
  const entries = getEntries();
  if(!entries.length){ showToast('Aucune donnée à exporter'); return; }
  const cols = KPIs.map(k=>k.id);
  const labels = KPIs.map(k=>k.label);
  let xml = `<?xml version="1.0"?><Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">`;
  xml += `<Worksheet ss:Name="Journal"><Table>`;
  xml += `<Row>${['Date',...cols].map(v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`).join('')}</Row>`;
  xml += `<Row>${['Indicateur',...labels].map(v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`).join('')}</Row>`;
  entries.forEach(e=>{
    xml+=`<Row>${[e.date,...cols.map(c=>e[c]||'')].map(v=>`<Cell><Data ss:Type="String">${esc(v)}</Data></Cell>`).join('')}</Row>`;
  });
  xml += `</Table></Worksheet></Workbook>`;
  dl(xml, 'Suivi_Sacha_'+today()+'.xls', 'application/vnd.ms-excel;charset=utf-8');
  showToast('Excel exporté ✓');
}

function dl(content,filename,type){
  const blob = new Blob([content],{type});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function today(){ return new Date().toISOString().split('T')[0]; }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

initDate();
renderForm();
